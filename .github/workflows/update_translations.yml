name: Update Translation Sources
on:
  push:
    branches:
      - main
    paths-ignore:
      - "i18n/**"
      - "i18n_compiled/**"
      - "README.md"
      - ".github/TRANSLATIONS.md"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  QT_VERSION: "6.10.1"
  VCPKG_ROOT: "C:/vcpkg"

jobs:
  update-translations:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: recursive
          fetch-depth: 0

      - name: Set up Visual Studio shell
        uses: egor-tensin/vs-shell@v2
        with:
          arch: x64

      - name: Setup vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:/vcpkg
          C:/vcpkg/bootstrap-vcpkg.bat

      - name: Install dependencies with vcpkg
        shell: pwsh
        run: |
          C:/vcpkg/vcpkg install hidapi:x64-windows getopt-win32:x64-windows

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: "win64_msvc2022_64"
          add-tools-to-path: true
          cache: true

      - name: Configure CMake
        shell: pwsh
        run: |
          if (Test-Path build) {
              Remove-Item -Recurse -Force build
          }

          cmake -S . -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_POLICY_DEFAULT_CMP0091=NEW `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Update translation source files
        shell: pwsh
        run: |
          cmake --build build --config Release --target update_translations

      - name: Remove obsolete entries from changed TS files
        shell: pwsh
        run: |
          $changedFiles = git diff --name-only -- i18n/*.ts
          if (-not $changedFiles) {
              Write-Host "No translation source changes detected"
              exit 0
          }

          foreach ($file in $changedFiles) {
              if (Test-Path $file) {
                  Write-Host "Cleaning obsolete entries in $file"
                  lconvert -no-obsolete $file -o "$file.tmp"
                  Move-Item -Force "$file.tmp" $file
              }
          }

      - name: Create pull request for translation source updates
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update translation source files [skip ci]"
          committer: GitHub Action <action@github.com>
          author: GitHub Action <action@github.com>
          branch: automation/update-translation-sources
          base: main
          delete-branch: true
          title: "Update translation source files"
          body: |
            Automated update for Qt translation source catalogs.

            This PR was created by the translation source update workflow and includes:
            - refreshed `.ts` files after running the `update_translations` CMake target
            - removal of obsolete translation entries in changed files
          add-paths: |
            i18n
