name: Update Compiled Translations
on:
  push:
    paths:
      - "i18n/*.ts"
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  QT_VERSION: "6.10.1"
  COMPILED_TRANSLATIONS_DIR: "i18n_compiled"

jobs:
  update-translations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install Qt
        uses: jurplel/install-qt-action@v4.3.0
        with:
          version: ${{ env.QT_VERSION }}
          add-tools-to-path: true
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Clean up obsolete translations
        run: |
          echo "Cleaning up obsolete translations from changed .ts files..."
          # Get list of changed .ts files in this push
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | grep 'i18n/.*\.ts$' || true)
          if [ -z "$CHANGED_FILES" ]; then
            echo "No .ts files changed in this push"
          else
            for ts_file in $CHANGED_FILES; do
              if [ -f "$ts_file" ]; then
                echo "Cleaning $ts_file"
                lconvert -no-obsolete "$ts_file" -o "${ts_file}.tmp"
                mv "${ts_file}.tmp" "$ts_file"
              fi
            done
          fi
          # Save changed files list for next step
          echo "$CHANGED_FILES" > /tmp/changed_ts_files.txt

      - name: Compile all translation files
        run: |
          echo "Compiling all .ts files to .qm files..."
          mkdir -p /tmp/qm_files
          for ts_file in i18n/*.ts; do
            if [ -f "$ts_file" ]; then
              filename=$(basename "$ts_file" .ts)
              qm_file="/tmp/qm_files/${filename}.qm"
              echo "Compiling $ts_file -> $qm_file"
              lrelease "$ts_file" -qm "$qm_file"
            fi
          done

      - name: Generate translation progress JSON
        run: |
          echo "Generating translation progress data..."
          mkdir -p /tmp/qm_files
          python3 tools/analyze_translations.py
          # Move the generated JSON to the temp directory
          mv i18n/compiled/translation_progress.json /tmp/qm_files/ 2>/dev/null || true

      - name: Prepare compiled files
        run: |
          OUTPUT_DIR="$GITHUB_WORKSPACE/${{ env.COMPILED_TRANSLATIONS_DIR }}"
          mkdir -p "$OUTPUT_DIR"

          # Replace previously generated artifacts so removed translations do not leave stale files behind.
          find "$OUTPUT_DIR" -maxdepth 1 -type f \( -name '*.qm' -o -name 'translation_progress.json' \) -delete
          cp /tmp/qm_files/*.qm "$OUTPUT_DIR/"
          if [ -f /tmp/qm_files/translation_progress.json ]; then
            cp /tmp/qm_files/translation_progress.json "$OUTPUT_DIR/"
          fi

      - name: Create pull request for compiled translations
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update compiled translations [skip ci]"
          committer: GitHub Action <action@github.com>
          author: GitHub Action <action@github.com>
          branch: automation/update-compiled-translations
          base: main
          delete-branch: true
          title: "Update compiled translations"
          body: |
            Automated update for compiled translation artifacts.

            This PR was created by the translation compilation workflow and includes:
            - refreshed compiled `.qm` files in `${{ env.COMPILED_TRANSLATIONS_DIR }}`
            - refreshed `translation_progress.json`
            - cleaned obsolete entries from changed translation source files
          add-paths: |
            i18n
            i18n_compiled
