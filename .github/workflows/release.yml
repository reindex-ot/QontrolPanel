name: Release
on:
  workflow_dispatch:
    inputs:
      workflow_run_id:
        description: "Build workflow run ID (optional - will use latest successful run if not provided)"
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get version from CMake
        id: cmake_version
        shell: pwsh
        run: |
          $content = Get-Content CMakeLists.txt -Raw
          $match = [regex]::Match($content, 'project\s*\(\s*(?<project>[^\s\)]+)\s+VERSION\s+(?<version>[^\s\)]+)', [System.Text.RegularExpressions.RegexOptions]::IgnoreCase)
          if (-not $match.Success) {
              throw "Unable to extract project version from CMakeLists.txt"
          }

          "project=$($match.Groups['project'].Value)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "version=$($match.Groups['version'].Value)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Download Windows artifact
        uses: dawidd6/action-download-artifact@v20
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build.yml
          workflow_conclusion: success
          name: QontrolPanel_win64_msvc2022
          run_id: ${{ inputs.workflow_run_id }}
          if_no_artifact_found: fail

      - name: Download Windows Installer
        uses: dawidd6/action-download-artifact@v20
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build.yml
          workflow_conclusion: success
          name: QontrolPanel_Installer
          run_id: ${{ inputs.workflow_run_id }}
          if_no_artifact_found: fail

      - name: Create release and tag
        run: |
          VERSION="${{ steps.cmake_version.outputs.version }}"
          echo "Creating release for version: $VERSION"

          git tag $VERSION
          git push origin $VERSION

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.cmake_version.outputs.version }}
          name: ${{ steps.cmake_version.outputs.version }}
          body: ""
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            QontrolPanel_win64_msvc2022.zip
            QontrolPanel_Installer.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
