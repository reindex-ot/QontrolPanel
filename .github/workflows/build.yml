name: Build
on:
  push:
    paths-ignore:
      - "i18n/**"
      - "i18n_compiled/**"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "i18n/**"
      - "i18n_compiled/**"
  workflow_dispatch:
env:
  QT_VERSION: "6.10.1"
  VCPKG_ROOT: "C:/vcpkg"
jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive
      - name: Get version from CMake
        id: cmake_version
        uses: DarwinInnovation/cmake-project-version-action@v1.0
      - name: Set up Visual Studio shell
        uses: egor-tensin/vs-shell@v2
        with:
          arch: x64
      - name: Setup vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:/vcpkg
          C:/vcpkg/bootstrap-vcpkg.bat
      - name: Install dependencies with vcpkg
        shell: pwsh
        run: |
          C:/vcpkg/vcpkg install hidapi:x64-windows getopt-win32:x64-windows
      - name: Install Qt
        id: qt
        uses: jurplel/install-qt-action@v4.3.0
        with:
          version: ${{ env.QT_VERSION }}
          arch: "win64_msvc2022_64"
          add-tools-to-path: true
          cache: true
      - name: Generate and Build with CMake
        shell: pwsh
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
          cmake --build . --config Release
          cmake --install . --config Release
      - name: Rename release folder
        shell: pwsh
        run: |
          $releaseDir = "build/install"
          $newDir = "QontrolPanel"
          if (Test-Path $releaseDir) {
              Rename-Item -Path $releaseDir -NewName $newDir
          } else {
              Write-Error "Release folder not found!"
              exit 1
          }
      - name: Zip binaries folder
        shell: pwsh
        run: |
          $zipFile = "build/QontrolPanel_win64_msvc2022.zip"
          $folder = "build/QontrolPanel"
          Compress-Archive -Path $folder -DestinationPath $zipFile
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: QontrolPanel_win64_msvc2022
          path: build/QontrolPanel_win64_msvc2022.zip
      - name: Update .iss version
        shell: pwsh
        run: |
          $content = Get-Content tools/installer.iss
          $new = $content -replace '(?<=#define AppVersion ")[^"]+', "${{ steps.cmake_version.outputs.version }}"
          Set-Content tools/installer.iss -Value $new
      - name: Download VC++ Redistributable
        shell: pwsh
        run: |
          $vcRedistUrl = "https://aka.ms/vs/17/release/vc_redist.x64.exe"
          $vcRedistPath = "build/vc_redist.x64.exe"
          Write-Host "Downloading VC++ Redistributable..."
          Invoke-WebRequest -Uri $vcRedistUrl -OutFile $vcRedistPath
          Write-Host "VC++ Redistributable downloaded successfully"
      - name: Create Installer
        shell: pwsh
        run: |
          $env:Path += ";${env:ProgramFiles(x86)}\Inno Setup 6"
          iscc.exe tools/installer.iss
      - name: Upload Installer
        uses: actions/upload-artifact@v7.0.0
        with:
          name: QontrolPanel_Installer
          path: tools/Output/QontrolPanel_Installer.exe
