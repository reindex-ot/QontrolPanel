name: Build
on:
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"
      - "**/*.md"
      - "i18n/**"
      - "i18n_compiled/**"
      - "dependencies/headsetcontrol/**"
      - ".github/workflows/*.yml"
      - ".assets/**"

  pull_request:
    branches:
      - main
    paths-ignore:
      - "*.md"
      - "**/*.md"
      - "i18n/**"
      - "i18n_compiled/**"
      - ".assets/**"

  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
env:
  QT_VERSION: "6.10.1"
  VCPKG_ROOT: "C:/vcpkg"
jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.head_ref || github.ref }}
          submodules: recursive
      - name: Update HeadsetControl submodule to latest master
        shell: pwsh
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --remote --checkout
          $headsetControlCommit = git -C dependencies/headsetcontrol rev-parse HEAD
          Write-Host "HeadsetControl submodule updated to $headsetControlCommit"
      - name: Get version from CMake
        id: cmake_version
        shell: pwsh
        run: |
          $content = Get-Content CMakeLists.txt -Raw
          $match = [regex]::Match($content, 'project\s*\(\s*(?<project>[^\s\)]+)\s+VERSION\s+(?<version>[^\s\)]+)', [System.Text.RegularExpressions.RegexOptions]::IgnoreCase)
          if (-not $match.Success) {
              throw "Unable to extract project version from CMakeLists.txt"
          }

          "project=$($match.Groups['project'].Value)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "version=$($match.Groups['version'].Value)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
      - name: Set up Visual Studio shell
        uses: egor-tensin/vs-shell@v2
        with:
          arch: x64
      - name: Setup vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:/vcpkg
          C:/vcpkg/bootstrap-vcpkg.bat
      - name: Install dependencies with vcpkg
        shell: pwsh
        run: |
          C:/vcpkg/vcpkg install hidapi:x64-windows getopt-win32:x64-windows
      - name: Install Qt
        id: qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: "win64_msvc2022_64"
          add-tools-to-path: true
          cache: true
      - name: Generate and Build with CMake
        shell: pwsh
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
          cmake --build . --config Release
          cmake --install . --config Release
      - name: Remove obsolete entries from changed TS files
        id: translation_updates
        shell: pwsh
        run: |
          $changedFiles = git diff --name-only -- i18n/*.ts
          if (-not $changedFiles) {
              Write-Host "No translation source changes detected"
              "has_changes=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
              exit 0
          }

          foreach ($file in $changedFiles) {
              if (Test-Path $file) {
                  Write-Host "Cleaning obsolete entries in $file"
                  lconvert -no-obsolete $file -o "$file.tmp"
                  Move-Item -Force "$file.tmp" $file
              }
          }

          "has_changes=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Create pull request for translation source updates
        if: steps.translation_updates.outputs.has_changes == 'true' && github.ref_name == 'main'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update translation source files [skip ci]"
          committer: GitHub Action <action@github.com>
          author: GitHub Action <action@github.com>
          branch: automation/update-translation-sources
          base: main
          delete-branch: true
          title: "Update translation source files"
          body: |
            Automated update for Qt translation source catalogs.

            This PR was created by the translation source update workflow and includes:
            - refreshed `.ts` files generated by the standard Release build
            - removal of obsolete translation entries in changed files
          add-paths: |
            i18n
      - name: Commit translation source updates to current branch
        if: steps.translation_updates.outputs.has_changes == 'true' && github.event_name == 'push' && github.ref_name != 'main'
        shell: pwsh
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add i18n

          if (git diff --cached --quiet) {
              Write-Host "No translation source changes staged"
              exit 0
          }

          git commit -m "Update translation source files [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
      - name: Commit translation source updates to PR branch
        if: steps.translation_updates.outputs.has_changes == 'true' && github.event_name == 'pull_request' && github.event.pull_request.head.ref != 'main' && github.event.pull_request.head.repo.full_name == github.repository
        shell: pwsh
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add i18n

          if (git diff --cached --quiet) {
              Write-Host "No translation source changes staged"
              exit 0
          }

          git commit -m "Update translation source files [skip ci]"
              git push origin HEAD:${{ github.event.pull_request.head.ref }}
      - name: Rename release folder
        shell: pwsh
        run: |
          $releaseDir = "build/install"
          $newDir = "QontrolPanel"
          if (Test-Path $releaseDir) {
              Rename-Item -Path $releaseDir -NewName $newDir
          } else {
              Write-Error "Release folder not found!"
              exit 1
          }
      - name: Zip binaries folder
        shell: pwsh
        run: |
          $zipFile = "build/QontrolPanel_win64_msvc2022.zip"
          $folder = "build/QontrolPanel"
          Compress-Archive -Path $folder -DestinationPath $zipFile
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: QontrolPanel_win64_msvc2022
          path: build/QontrolPanel_win64_msvc2022.zip
      - name: Update .iss version
        shell: pwsh
        run: |
          $content = Get-Content tools/installer.iss
          $new = $content -replace '(?<=#define AppVersion ")[^"]+', "${{ steps.cmake_version.outputs.version }}"
          Set-Content tools/installer.iss -Value $new
      - name: Download VC++ Redistributable
        shell: pwsh
        run: |
          $vcRedistUrl = "https://aka.ms/vs/17/release/vc_redist.x64.exe"
          $vcRedistPath = "build/vc_redist.x64.exe"
          Write-Host "Downloading VC++ Redistributable..."
          Invoke-WebRequest -Uri $vcRedistUrl -OutFile $vcRedistPath
          Write-Host "VC++ Redistributable downloaded successfully"
      - name: Create Installer
        shell: pwsh
        run: |
          $env:Path += ";${env:ProgramFiles(x86)}\Inno Setup 6"
          iscc.exe tools/installer.iss
      - name: Upload Installer
        uses: actions/upload-artifact@v7
        with:
          name: QontrolPanel_Installer
          path: tools/Output/QontrolPanel_Installer.exe
